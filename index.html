<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@19';
    import ReactDOM from 'https://esm.sh/react-dom@19/client';
    import { 
      Video, VideoOff, Mic, MicOff, Phone, PhoneOff, Copy, User, LogOut, Loader2, AlertCircle, Clock, History, ArrowUpRight, ArrowDownLeft, X, Send, MessageSquare, MonitorUp 
    } from 'https://esm.sh/lucide-react';
    import { motion, AnimatePresence } from 'https://esm.sh/motion/react';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc, query, where, deleteDoc, getDocs, or, orderBy, limit, getDocFromServer } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
      "projectId": "gen-lang-client-0027443780",
      "appId": "1:298610100251:web:f0553fb8729b762f7350be",
      "apiKey": "AIzaSyDpWHbTdYUqvw6DxP7DetiYV1gDH6ge5xs",
      "authDomain": "gen-lang-client-0027443780.firebaseapp.com",
      "firestoreDatabaseId": "ai-studio-9f15cb92-9ec7-4daf-b1e7-28d027adb64b",
      "storageBucket": "gen-lang-client-0027443780.firebasestorage.app",
      "messagingSenderId": "298610100251",
      "measurementId": ""
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
    const googleProvider = new GoogleAuthProvider();

    const ADMIN_EMAIL = 'kaushalllsharma24@gmail.com';

    const ADJECTIVES = ['Cool', 'Happy', 'Fast', 'Smart', 'Brave', 'Kind', 'Calm', 'Bold', 'Swift', 'Wise'];
    const NOUNS = ['Tiger', 'Eagle', 'Shark', 'Lion', 'Wolf', 'Bear', 'Falcon', 'Panda', 'Fox', 'Hawk'];

    function generateReadableId() {
      const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
      const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
      const num = Math.floor(100 + Math.random() * 899);
      return `${adj}${noun}${num}`;
    }

    const OperationType = {
      CREATE: 'create',
      UPDATE: 'update',
      DELETE: 'delete',
      LIST: 'list',
      GET: 'get',
      WRITE: 'write',
    };

    function handleFirestoreError(error, operationType, path) {
      const errInfo = {
        error: error instanceof Error ? error.message : String(error),
        authInfo: {
          userId: auth.currentUser?.uid,
          email: auth.currentUser?.email,
          emailVerified: auth.currentUser?.emailVerified,
          isAnonymous: auth.currentUser?.isAnonymous,
          tenantId: auth.currentUser?.tenantId,
          providerInfo: auth.currentUser?.providerData.map(provider => ({
            providerId: provider.providerId,
            displayName: provider.displayName,
            email: provider.email,
            photoUrl: provider.photoURL
          })) || []
        },
        operationType,
        path
      };
      console.error('Firestore Error: ', JSON.stringify(errInfo));
      throw new Error(JSON.stringify(errInfo));
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      render() {
        if (this.state.hasError) {
          let errorMessage = "Something went wrong.";
          try {
            const parsed = JSON.parse(this.state.error.message);
            if (parsed.error) errorMessage = `Firestore Error: ${parsed.error}`;
          } catch (e) {
            errorMessage = this.state.error?.message || errorMessage;
          }

          return React.createElement('div', { className: "min-h-screen bg-neutral-950 flex items-center justify-center p-4" },
            React.createElement('div', { className: "bg-neutral-900 border border-red-500/50 p-8 rounded-3xl max-w-md w-full text-center space-y-4" },
              React.createElement(AlertCircle, { className: "w-12 h-12 text-red-500 mx-auto" }),
              React.createElement('h2', { className: "text-xl font-bold text-white" }, "Application Error"),
              React.createElement('p', { className: "text-neutral-400 text-sm" }, errorMessage),
              React.createElement('button', { 
                onClick: () => window.location.reload(),
                className: "w-full bg-neutral-800 hover:bg-neutral-700 py-3 rounded-xl transition-colors"
              }, "Reload App")
            )
          );
        }
        return this.props.children;
      }
    }

    const servers = {
      iceServers: [
        {
          urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'],
        },
      ],
      iceCandidatePoolSize: 10,
    };

    function LiveCallApp() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [remoteUserId, setRemoteUserId] = useState('');
      const [callId, setCallId] = useState(null);
      const [isCalling, setIsCalling] = useState(false);
      const [isIncomingCall, setIsIncomingCall] = useState(false);
      const [incomingCallData, setIncomingCallData] = useState(null);
      const [localStream, setLocalStream] = useState(null);
      const [remoteStream, setRemoteStream] = useState(null);
      const [isMicOn, setIsMicOn] = useState(true);
      const [isCamOn, setIsCamOn] = useState(true);
      const [error, setError] = useState(null);
      const [callHistory, setCallHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      const [customId, setCustomId] = useState('');
      const [isEditingId, setIsEditingId] = useState(false);
      const [callDuration, setCallDuration] = useState(0);
      const [isRemoteMutedByHost, setIsRemoteMutedByHost] = useState(false);
      const [isCaller, setIsCaller] = useState(false);
      const [showEmailModal, setShowEmailModal] = useState(false);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [authLoading, setAuthLoading] = useState(false);
      
      // New states for Chat and Screen Sharing
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [showChat, setShowChat] = useState(false);
      const [isScreenSharing, setIsScreenSharing] = useState(false);
      const [screenStream, setScreenStream] = useState(null);

      const pc = useRef(null);
      const localVideoRef = useRef(null);
      const remoteVideoRef = useRef(null);
      const incomingCallUnsubscribe = useRef(null);
      const durationInterval = useRef(null);
      
      // Audio Refs
      const ringtoneRef = useRef(null); // Incoming
      const callingSoundRef = useRef(null); // Outgoing

      useEffect(() => {
        ringtoneRef.current = new Audio('https://assets.mixkit.co/active_storage/sfx/135/135-preview.mp3');
        callingSoundRef.current = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');
        ringtoneRef.current.loop = true;
        callingSoundRef.current.loop = true;

        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }, []);

      useEffect(() => {
        if (callId && isCalling) {
          durationInterval.current = setInterval(() => {
            setCallDuration(prev => prev + 1);
          }, 1000);
        } else {
          clearInterval(durationInterval.current);
          setCallDuration(0);
        }
        return () => clearInterval(durationInterval.current);
      }, [callId, isCalling]);

      const formatDuration = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      useEffect(() => {
        async function testConnection() {
          try {
            await getDocFromServer(doc(db, 'test', 'connection'));
          } catch (error) {
            if(error instanceof Error && error.message.includes('the client is offline')) {
              console.error("Please check your Firebase configuration. ");
            }
          }
        }
        testConnection();

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setError('Media devices API is not supported in this browser or context. Please use a modern browser like Chrome or Safari over HTTPS.');
        }

        const checkPermissions = async () => {
          if (navigator.permissions && navigator.permissions.query) {
            try {
              const cam = await navigator.permissions.query({ name: 'camera' });
              const mic = await navigator.permissions.query({ name: 'microphone' });
              
              const updateStatus = () => {
                 if (cam.state === 'denied' || mic.state === 'denied') {
                   setError('Permission denied. Please click the camera icon in your browser address bar and allow access.');
                 }
              };
              cam.onchange = updateStatus;
              mic.onchange = updateStatus;
              updateStatus();
            } catch (e) {
              console.warn('Permissions API not fully supported', e);
            }
          }
        };
        checkPermissions();

        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          if (user) {
            const userDoc = doc(db, 'users', user.uid);
            try {
              const docSnap = await getDoc(userDoc);
              let userData = docSnap.exists() ? docSnap.data() : null;
              
              if (!userData || !userData.username) {
                const newUsername = generateReadableId();
                await setDoc(userDoc, {
                  uid: user.uid,
                  displayName: user.displayName,
                  email: user.email,
                  photoURL: user.photoURL,
                  username: newUsername,
                  lastSeen: new Date().toISOString()
                }, { merge: true });
                setCustomId(newUsername);
              } else {
                setCustomId(userData.username);
              }
            } catch (err) {
              handleFirestoreError(err, OperationType.WRITE, `users/${user.uid}`);
            }
            setUser(user);
            
            setTimeout(() => {
              if (incomingCallUnsubscribe.current) incomingCallUnsubscribe.current();
              incomingCallUnsubscribe.current = setupIncomingCallListener(user.uid);
            }, 500);
          } else {
            setUser(null);
            if (incomingCallUnsubscribe.current) {
              incomingCallUnsubscribe.current();
              incomingCallUnsubscribe.current = null;
            }
          }
          setLoading(false);
        });
        return () => {
          unsubscribe();
          if (incomingCallUnsubscribe.current) incomingCallUnsubscribe.current();
        };
      }, []);

      useEffect(() => {
        if (!user) return;
        
        const q = query(
          collection(db, 'calls'),
          or(where('callerId', '==', user.uid), where('receiverId', '==', user.uid)),
          orderBy('createdAt', 'desc'),
          limit(20)
        );

        const unsubscribe = onSnapshot(q, (snapshot) => {
          const history = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setCallHistory(history);
        }, (error) => {
          console.warn('Call history fetch failed:', error);
        });

        return () => unsubscribe();
      }, [user]);

      const [incomingCallerName, setIncomingCallerName] = useState('Someone');

      const setupIncomingCallListener = (uid) => {
        const q = query(
          collection(db, 'calls'),
          where('receiverId', '==', uid),
          where('status', '==', 'pending')
        );

        const unsubscribeIncoming = onSnapshot(q, async (snapshot) => {
          snapshot.docChanges().forEach(async (change) => {
            if (change.type === 'added') {
              const callData = { id: change.doc.id, ...change.doc.data() };
              setIncomingCallData(callData);
              setIsIncomingCall(true);
              ringtoneRef.current?.play().catch(() => {});
              
              // Fetch caller name
              try {
                const callerDoc = await getDoc(doc(db, 'users', callData.callerId));
                if (callerDoc.exists()) {
                  setIncomingCallerName(callerDoc.data().username || 'Someone');
                }
              } catch (e) {}

              if (Notification.permission === 'granted') {
                new Notification('Incoming Video Call', {
                  body: `${incomingCallerName} is calling you on LiveCall.io`,
                  icon: 'https://picsum.photos/seed/livecall/192/192'
                });
              }
            }
            if (change.type === 'removed') {
              setIsIncomingCall(false);
              setIncomingCallData(null);
              ringtoneRef.current?.pause();
              ringtoneRef.current.currentTime = 0;
            }
          });
        }, (error) => {
          handleFirestoreError(error, OperationType.GET, 'calls');
        });

        // Listen for missed calls
        const missedQ = query(
          collection(db, 'calls'),
          where('receiverId', '==', uid),
          where('status', '==', 'ended')
        );
        const unsubscribeMissed = onSnapshot(missedQ, (snapshot) => {
          snapshot.docChanges().forEach((change) => {
            if (change.type === 'added') {
              const data = change.doc.data();
              const now = new Date();
              const createdAt = new Date(data.createdAt);
              if (now - createdAt < 60000) {
                if (Notification.permission === 'granted') {
                  new Notification('Missed Call', {
                    body: 'You missed a video call.',
                    icon: 'https://picsum.photos/seed/livecall/192/192'
                  });
                }
              }
            }
          });
        });

        return () => {
          unsubscribeIncoming();
          unsubscribeMissed();
        };
      };

      const startLocalStream = async () => {
        setError(null);
        console.log('Attempting to start local stream...');
        try {
          if (!window.isSecureContext) {
            const msg = 'Camera/Mic access requires a secure context (HTTPS). Current origin: ' + window.location.origin;
            setError(msg);
            console.error(msg);
            return null;
          }

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            const msg = 'Media devices API is not supported in this browser or context. Check if permissions are blocked by a policy.';
            setError(msg);
            console.error(msg);
            return null;
          }

          let stream;
          try {
            // Try with ideal constraints first
            stream = await navigator.mediaDevices.getUserMedia({ 
              video: { width: { ideal: 1280 }, height: { ideal: 720 } }, 
              audio: true 
            });
          } catch (e) {
            console.warn('Failed with ideal constraints, trying simple constraints...', e);
            // Fallback to simple constraints
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          }
          
          setLocalStream(stream);
          if (localVideoRef.current) {
            localVideoRef.current.srcObject = stream;
          }
          console.log('Local stream started successfully');
          return stream;
        } catch (err) {
          console.error('getUserMedia error:', err);
          let userMsg = '';
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
            userMsg = 'Permission denied. Please click the camera icon in your browser address bar and allow access. If you are on mobile, check your system settings for the browser.';
          } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
            userMsg = 'No camera or microphone found on this device. Please connect one and try again.';
          } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
            userMsg = 'Camera or microphone is already in use by another application or blocked by system settings.';
          } else if (err.name === 'OverconstrainedError') {
            userMsg = 'Your camera does not support the requested resolution. Try refreshing the page.';
          } else {
            userMsg = `Could not access media devices: ${err.message || err.name || 'Unknown error'}`;
          }
          setError(userMsg);
          return null;
        }
      };

      const setupPeerConnection = async (stream) => {
        pc.current = new RTCPeerConnection(servers);

        stream.getTracks().forEach((track) => {
          pc.current?.addTrack(track, stream);
        });

        pc.current.ontrack = (event) => {
          const [remoteStream] = event.streams;
          setRemoteStream(remoteStream);
          if (remoteVideoRef.current) {
            remoteVideoRef.current.srcObject = remoteStream;
          }
        };

        return pc.current;
      };

      const sendMessage = async () => {
        if (!newMessage.trim() || !callId) return;
        const msg = {
          text: newMessage,
          senderId: user.uid,
          createdAt: new Date().toISOString()
        };
        try {
          await addDoc(collection(db, 'calls', callId, 'messages'), msg);
          setNewMessage('');
        } catch (err) {
          handleFirestoreError(err, OperationType.WRITE, `calls/${callId}/messages`);
        }
      };

      const toggleScreenShare = async () => {
        if (!isScreenSharing) {
          try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            setScreenStream(stream);
            setIsScreenSharing(true);
            
            const videoTrack = stream.getVideoTracks()[0];
            const sender = pc.current.getSenders().find(s => s.track.kind === 'video');
            if (sender) sender.replaceTrack(videoTrack);

            videoTrack.onended = () => {
              stopScreenShare();
            };
          } catch (err) {
            console.error('Screen sharing error:', err);
          }
        } else {
          stopScreenShare();
        }
      };

      const stopScreenShare = async () => {
        if (screenStream) {
          screenStream.getTracks().forEach(t => t.stop());
          setScreenStream(null);
        }
        setIsScreenSharing(false);
        const videoTrack = localStream.getVideoTracks()[0];
        const sender = pc.current.getSenders().find(s => s.track.kind === 'video');
        if (sender) sender.replaceTrack(videoTrack);
      };

      const toggleFullscreen = (enable) => {
        if (enable) {
          if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(err => {
              console.warn(`Error attempting to enable full-screen mode: ${err.message}`);
            });
          }
        } else {
          if (document.exitFullscreen && document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
          }
        }
      };

      const createCall = async () => {
        if (!remoteUserId) return;
        setIsCalling(true);
        setError(null);
        callingSoundRef.current?.play().catch(() => {});
        toggleFullscreen(true);

        let targetUid = remoteUserId;
        // Check if input is a username
        try {
          const usersRef = collection(db, 'users');
          const q = query(usersRef, where('username', '==', remoteUserId));
          const querySnapshot = await getDocs(q);
          if (!querySnapshot.empty) {
            targetUid = querySnapshot.docs[0].data().uid;
          }
        } catch (err) {
          console.warn('Username search failed', err);
        }

        const stream = await startLocalStream();
        if (!stream) {
          setIsCalling(false);
          return;
        }

        const peerConnection = await setupPeerConnection(stream);
        const callDoc = doc(collection(db, 'calls'));
        const callerCandidates = collection(callDoc, 'callerCandidates');
        const receiverCandidates = collection(callDoc, 'receiverCandidates');

        setCallId(callDoc.id);
        setIsCaller(true);

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            addDoc(callerCandidates, event.candidate.toJSON()).catch(err => {
              handleFirestoreError(err, OperationType.WRITE, `calls/${callDoc.id}/callerCandidates`);
            });
          }
        };

        const offerDescription = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offerDescription);

        const offer = {
          sdp: offerDescription.sdp,
          type: offerDescription.type,
        };

        try {
          await setDoc(callDoc, {
            callerId: user.uid,
            receiverId: targetUid,
            offer,
            status: 'pending',
            muteRemote: false,
            createdAt: new Date().toISOString()
          });
        } catch (err) {
          handleFirestoreError(err, OperationType.WRITE, `calls/${callDoc.id}`);
        }

        onSnapshot(callDoc, (snapshot) => {
          const data = snapshot.data();
          if (!peerConnection.currentRemoteDescription && data?.answer) {
            const answerDescription = new RTCSessionDescription(data.answer);
            peerConnection.setRemoteDescription(answerDescription);
          }
          if (data?.status === 'accepted') {
            callingSoundRef.current?.pause();
            callingSoundRef.current.currentTime = 0;
          }
          if (data?.status === 'rejected') {
            endCall();
            setError('Call rejected');
          }
          if (data?.status === 'ended') {
            endCall();
          }
          if (data?.callerId === user.uid) {
            setIsRemoteMutedByHost(data.muteRemote);
          }
        }, (error) => {
          handleFirestoreError(error, OperationType.GET, `calls/${callDoc.id}`);
        });

        onSnapshot(receiverCandidates, (snapshot) => {
          snapshot.docChanges().forEach((change) => {
            if (change.type === 'added') {
              const data = change.doc.data();
              const candidate = new RTCIceCandidate(data);
              peerConnection.addIceCandidate(candidate);
            }
          });
        }, (error) => {
          handleFirestoreError(error, OperationType.GET, `calls/${callDoc.id}/receiverCandidates`);
        });

        // Listen for messages
        onSnapshot(collection(callDoc, 'messages'), (snapshot) => {
          const msgs = snapshot.docs.map(doc => doc.data()).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
          setMessages(msgs);
        });
      };

      const answerCall = async () => {
        if (!incomingCallData) return;
        setIsIncomingCall(false);
        setIsCalling(true);
        ringtoneRef.current?.pause();
        ringtoneRef.current.currentTime = 0;
        toggleFullscreen(true);

        const stream = await startLocalStream();
        if (!stream) {
          setIsCalling(false);
          return;
        }

        const peerConnection = await setupPeerConnection(stream);
        const callDoc = doc(db, 'calls', incomingCallData.id);
        const callerCandidates = collection(callDoc, 'callerCandidates');
        const receiverCandidates = collection(callDoc, 'receiverCandidates');

        setCallId(callDoc.id);
        setIsCaller(false);

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            addDoc(receiverCandidates, event.candidate.toJSON()).catch(err => {
              handleFirestoreError(err, OperationType.WRITE, `calls/${callDoc.id}/receiverCandidates`);
            });
          }
        };

        const offerDescription = incomingCallData.offer;
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDescription));

        const answerDescription = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answerDescription);

        const answer = {
          type: answerDescription.type,
          sdp: answerDescription.sdp,
        };

        try {
          await updateDoc(callDoc, { answer, status: 'accepted' });
        } catch (err) {
          handleFirestoreError(err, OperationType.WRITE, `calls/${callDoc.id}`);
        }

        onSnapshot(callerCandidates, (snapshot) => {
          snapshot.docChanges().forEach((change) => {
            if (change.type === 'added') {
              const data = change.doc.data();
              peerConnection.addIceCandidate(new RTCIceCandidate(data));
            }
          });
        }, (error) => {
          handleFirestoreError(error, OperationType.GET, `calls/${callDoc.id}/callerCandidates`);
        });

        onSnapshot(callDoc, (snapshot) => {
          const data = snapshot.data();
          if (data?.status === 'ended') {
            endCall();
          }
          // Listen for host mute command
          if (data?.callerId !== user.uid && data?.muteRemote !== undefined) {
            stream.getAudioTracks().forEach(track => {
              track.enabled = !data.muteRemote;
            });
            setIsMicOn(!data.muteRemote);
          }
          if (data?.callerId === user.uid) {
            setIsRemoteMutedByHost(data.muteRemote);
          }
